<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="33%" style="stop-color:#10a37f"/>
      <stop offset="66%" style="stop-color:#0094ff"/>
      <stop offset="100%" style="stop-color:#4285f4"/>
    </linearGradient>
    <linearGradient id="grad-v" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4285f4"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <filter id="glow-purple">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#7c3aed" flood-opacity="0.3"/>
    </filter>
    <filter id="glow-green">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#10a37f" flood-opacity="0.3"/>
    </filter>
    <filter id="glow-cyan">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#0094ff" flood-opacity="0.3"/>
    </filter>
    <filter id="glow-blue">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#4285f4" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- White background -->
  <rect width="800" height="280" rx="16" fill="#ffffff"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
    <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#f0f0f0" stroke-width="0.5"/>
  </pattern>
  <rect width="800" height="280" rx="16" fill="url(#grid)" opacity="0.6"/>

  <!-- Gradient accent line at top -->
  <rect x="0" y="0" width="800" height="4" rx="2" fill="url(#grad)"/>

  <!-- === Switch Icon (centered, larger) === -->
  <g transform="translate(400, 90)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="42" fill="none" stroke="#e8e8e8" stroke-width="1.5"/>

    <!-- Connection arcs (subtle background curves) -->
    <path d="M -30 -30 Q -55 0 -30 30" fill="none" stroke="#f0f0f0" stroke-width="8" stroke-linecap="round"/>
    <path d="M 30 -30 Q 55 0 30 30" fill="none" stroke="#f0f0f0" stroke-width="8" stroke-linecap="round"/>

    <!-- Provider nodes on the ring -->
    <!-- Claude (purple) - top left -->
    <circle cx="-30" cy="-30" r="12" fill="#7c3aed" filter="url(#glow-purple)"/>
    <text x="-30" y="-26" text-anchor="middle" fill="#fff" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700">C</text>

    <!-- Codex (green) - bottom left -->
    <circle cx="-30" cy="30" r="12" fill="#10a37f" filter="url(#glow-green)"/>
    <text x="-30" y="34" text-anchor="middle" fill="#fff" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700">O</text>

    <!-- Gemini (blue) - top right -->
    <circle cx="30" cy="-30" r="12" fill="#4285f4" filter="url(#glow-blue)"/>
    <text x="30" y="-26" text-anchor="middle" fill="#fff" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700">G</text>

    <!-- Cursor (cyan) - bottom right -->
    <circle cx="30" cy="30" r="12" fill="#0094ff" filter="url(#glow-cyan)"/>
    <text x="30" y="34" text-anchor="middle" fill="#fff" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700">U</text>

    <!-- Center switch symbol -->
    <circle cx="0" cy="0" r="16" fill="#ffffff" stroke="url(#grad)" stroke-width="2.5"/>
    <!-- Up arrow -->
    <path d="M -5 2 L 0 -5 L 5 2" fill="none" stroke="#7c3aed" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Down arrow -->
    <path d="M -5 -2 L 0 5 L 5 -2" fill="none" stroke="#4285f4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" transform="translate(0, 6)"/>

    <!-- Connecting lines from center to nodes -->
    <line x1="-14" y1="-8" x2="-20" y2="-20" stroke="#7c3aed" stroke-width="1.5" opacity="0.4"/>
    <line x1="-14" y1="8" x2="-20" y2="20" stroke="#10a37f" stroke-width="1.5" opacity="0.4"/>
    <line x1="14" y1="-8" x2="20" y2="-20" stroke="#4285f4" stroke-width="1.5" opacity="0.4"/>
    <line x1="14" y1="8" x2="20" y2="20" stroke="#0094ff" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- === Title === -->
  <text x="400" y="175" text-anchor="middle" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="44" font-weight="800" fill="#1a1a2e" letter-spacing="-1.5" filter="url(#shadow)">
    Agent<tspan fill="url(#grad)">Switch</tspan>
  </text>

  <!-- === Slogan === -->
  <text x="400" y="208" text-anchor="middle" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="16" fill="#6b7280" letter-spacing="2" font-weight="400">
    ONE SDK FOR EVERY AI CODING AGENT
  </text>

  <!-- === Provider pills === -->
  <!-- Claude -->
  <rect x="148" y="232" width="110" height="28" rx="14" fill="#f5f0ff" stroke="#7c3aed" stroke-width="1"/>
  <circle cx="168" cy="246" r="5" fill="#7c3aed"/>
  <text x="208" y="250" text-anchor="middle" fill="#7c3aed" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600">Claude Code</text>

  <!-- Codex -->
  <rect x="270" y="232" width="100" height="28" rx="14" fill="#f0fdf4" stroke="#10a37f" stroke-width="1"/>
  <circle cx="290" cy="246" r="5" fill="#10a37f"/>
  <text x="325" y="250" text-anchor="middle" fill="#10a37f" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600">Codex CLI</text>

  <!-- Cursor -->
  <rect x="382" y="232" width="120" height="28" rx="14" fill="#f0f7ff" stroke="#0094ff" stroke-width="1"/>
  <circle cx="402" cy="246" r="5" fill="#0094ff"/>
  <text x="447" y="250" text-anchor="middle" fill="#0094ff" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600">Cursor Agent</text>

  <!-- Gemini -->
  <rect x="514" y="232" width="115" height="28" rx="14" fill="#eff6ff" stroke="#4285f4" stroke-width="1"/>
  <circle cx="534" cy="246" r="5" fill="#4285f4"/>
  <text x="576" y="250" text-anchor="middle" fill="#4285f4" font-family="'Inter', 'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600">Gemini CLI</text>
</svg>
